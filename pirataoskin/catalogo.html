<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catálogo de Skins — PIRATAOSKIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap crumb"><a href="index.html">Início</a> / <span>Catálogo</span></div>

  <div class="wrap catalog">
    <!-- FILTROS -->
    <aside class="filters" id="filters">
      <h3 class="display">Filtros</h3>

      <div class="fgroup">
        <div class="lbl">Buscar</div>
        <div class="frow"><input type="search" id="f-q" placeholder="Nome, arma, coleção..." /></div>
      </div>

      <div class="fgroup">
        <div class="lbl">Raridade</div>
        <div class="chips" id="f-rar"></div>
      </div>

      <div class="fgroup">
        <div class="lbl">Desgaste (Wear)</div>
        <div class="chips" id="f-wear"></div>
      </div>

      <div class="fgroup">
        <div class="lbl">Preço (R$)</div>
        <div class="frow">
          <input type="number" id="f-min" placeholder="mín" min="0" />
          <span style="color:var(--text-muted)">—</span>
          <input type="number" id="f-max" placeholder="máx" min="0" />
        </div>
      </div>

      <div class="fgroup" style="border-bottom:none;padding-bottom:0">
        <button class="btn btn-soft btn-block" id="f-clear">Limpar filtros</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="catalog-main">
      <div class="topbar">
        <div>
          <h2 class="display" id="cat-title" style="margin:0">Skins à venda</h2>
          <span class="count" id="count">carregando…</span>
        </div>
        <div style="display:flex;gap:.6rem">
          <button class="btn btn-soft btn-sm filters-toggle" onclick="document.getElementById('filters').scrollIntoView({behavior:'smooth'})">Filtros</button>
          <select class="select" id="sort">
            <option value="price-asc">Menor preço</option>
            <option value="price-desc">Maior preço</option>
            <option value="name">Nome (A-Z)</option>
          </select>
        </div>
      </div>
      <div class="grid" id="grid"></div>
    </main>
  </div>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/site.js"></script>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    var allItems = [];
    var state = { q: "", rar: new Set(), wear: new Set(), min: null, max: null, sort: "price-asc" };

    // pré-preenche busca via ?q=
    var params = new URLSearchParams(location.search);
    state.q = params.get("q") || "";
    document.getElementById("f-q").value = state.q;

    function buildChips() {
      var rarSet = {}, wearSet = {};
      allItems.forEach(function (i) {
        if (i.rarity) rarSet[i.rarity] = i.rarityColor || "#5E98D9";
        if (i.wear) wearSet[i.wear] = true;
      });
      document.getElementById("f-rar").innerHTML = Object.keys(rarSet).sort().map(function (r) {
        return '<span class="chip" data-rar="' + r + '" style="border-color:' + rarSet[r] + '55">' + r + '</span>';
      }).join("") || '<span style="color:var(--text-muted);font-size:.8rem">—</span>';
      document.getElementById("f-wear").innerHTML = Object.keys(wearSet).sort().map(function (w) {
        return '<span class="chip" data-wear="' + w + '">' + w + '</span>';
      }).join("") || '<span style="color:var(--text-muted);font-size:.8rem">—</span>';

      document.querySelectorAll("#f-rar .chip").forEach(function (el) {
        el.addEventListener("click", function () { toggleSet(state.rar, el.dataset.rar, el); });
      });
      document.querySelectorAll("#f-wear .chip").forEach(function (el) {
        el.addEventListener("click", function () { toggleSet(state.wear, el.dataset.wear, el); });
      });
    }

    function toggleSet(set, val, el) {
      if (set.has(val)) { set.delete(val); el.classList.remove("on"); }
      else { set.add(val); el.classList.add("on"); }
      render();
    }

    document.getElementById("f-q").addEventListener("input", function (e) { state.q = e.target.value; render(); });
    document.getElementById("f-min").addEventListener("input", function (e) { state.min = e.target.value ? parseFloat(e.target.value) : null; render(); });
    document.getElementById("f-max").addEventListener("input", function (e) { state.max = e.target.value ? parseFloat(e.target.value) : null; render(); });
    document.getElementById("sort").addEventListener("change", function (e) { state.sort = e.target.value; render(); });
    document.getElementById("f-clear").addEventListener("click", function () {
      state.q = ""; state.rar.clear(); state.wear.clear(); state.min = null; state.max = null;
      document.getElementById("f-q").value = "";
      document.getElementById("f-min").value = ""; document.getElementById("f-max").value = "";
      document.querySelectorAll(".filters .chip.on").forEach(function (c) { c.classList.remove("on"); });
      render();
    });

    function apply() {
      var list = allItems.filter(function (i) {
        if (state.q && (i.name || "").toLowerCase().indexOf(state.q.toLowerCase()) === -1) return false;
        if (state.rar.size && !state.rar.has(i.rarity)) return false;
        if (state.wear.size && !state.wear.has(i.wear)) return false;
        if (state.min != null && (i.price == null || i.price < state.min)) return false;
        if (state.max != null && (i.price == null || i.price > state.max)) return false;
        return true;
      });
      var sorters = {
        "price-asc": function (a, b) { return (a.price == null ? Infinity : a.price) - (b.price == null ? Infinity : b.price); },
        "price-desc": function (a, b) { return (b.price == null ? -Infinity : b.price) - (a.price == null ? -Infinity : a.price); },
        "name": function (a, b) { return (a.name || "").localeCompare(b.name || ""); },
      };
      return list.sort(sorters[state.sort]);
    }

    function render() {
      if (!allItems.length) return;
      var list = apply();
      document.getElementById("count").textContent = list.length + (list.length === 1 ? " item" : " itens");
      var grid = document.getElementById("grid");
      if (!grid) {
        grid = document.createElement("div"); grid.className = "grid"; grid.id = "grid";
        var empty = document.querySelector(".catalog-main .empty");
        if (empty) empty.replaceWith(grid); else document.querySelector(".catalog-main").appendChild(grid);
      }
      if (!list.length) {
        grid.outerHTML = '<div class="empty"><div class="big">🪙</div><p>Nenhuma skin encontrada nesse baú. Tente outros filtros, marujo!</p></div>';
        return;
      }
      PIRATA.renderStore(grid, list);
    }

    // carrega o inventário real à venda
    fetch("/api/store?limit=240", { credentials: "same-origin" })
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (data.error === "private") {
          document.getElementById("count").textContent = "inventário da loja está privado";
          document.getElementById("grid").innerHTML = '<div class="empty"><div class="big">🔒</div><p>O inventário da loja está privado na Steam.</p></div>';
          return;
        }
        allItems = (data.items || []);
        buildChips();
        render();
      })
      .catch(function () {
        document.getElementById("count").textContent = "falha ao carregar";
      });
  });
  </script>
</body>
</html>
