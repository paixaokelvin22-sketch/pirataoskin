<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil do Usuário — PIRATAOSKIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    .profile-header { display: flex; align-items: center; gap: 1.5rem; padding: 2rem; background: var(--bg-elev); border-radius: .8rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--gold); object-fit: cover; }
    .profile-info { flex: 1; min-width: 200px; }
    .profile-info .name { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--text); }
    .profile-info .steamid { color: var(--text-muted); font-size: .85rem; font-family: monospace; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: var(--bg-elev); border: 1px solid var(--border); border-radius: .8rem; padding: 1rem; text-align: center; }
    .stat-card .val { font-family: 'Cinzel', serif; font-size: 1.6rem; color: var(--gold); }
    .stat-card .lbl { color: var(--text-muted); font-size: .8rem; margin-top: .4rem; text-transform: uppercase; letter-spacing: .04em; }
    .section { margin-bottom: 2rem; }
    .section-head { font-family: 'Cinzel', serif; font-size: 1.3rem; color: var(--text); margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }
    .section-head::before { content: ''; width: 4px; height: 20px; background: var(--gold); border-radius: 2px; }
    .order-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; }
    .order-item { background: var(--bg-elev); border: 1px solid var(--border); border-radius: .6rem; padding: .8rem; text-align: center; }
    .order-item img { width: 100%; height: 120px; object-fit: contain; margin-bottom: .6rem; background: var(--bg-elev-2); border-radius: .4rem; }
    .order-item .iname { font-size: .75rem; color: var(--text); margin-bottom: .3rem; line-height: 1.2; min-height: 2.2em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .order-item .iprice { font-family: 'Cinzel', serif; color: var(--gold); font-size: .9rem; font-weight: 600; }
    .order-item .istatus { font-size: .7rem; color: var(--text-muted); margin-top: .3rem; }
    .empty { text-align: center; padding: 2rem; color: var(--text-muted); }
    .gate { text-align: center; padding: 5rem 1rem; color: var(--text-muted); }
    .btn-back { display: inline-block; margin-bottom: 1rem; color: var(--gold); text-decoration: none; font-size: .9rem; }
    .btn-back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap crumb"><a href="admin.html">Admin</a> / <span id="crumb-name">Perfil</span></div>

  <main class="wrap section" id="profile-root">
    <div class="gate" id="gate"><div style="font-size:3rem">🔒</div><p>Verificando acesso…</p></div>

    <div id="profile-content" style="display:none">
      <a href="admin.html" class="btn-back">← Voltar ao Admin</a>

      <!-- HEADER -->
      <div class="profile-header">
        <img id="profile-avatar" src="" alt="Avatar" class="profile-avatar" />
        <div class="profile-info">
          <div class="name" id="profile-name">—</div>
          <div class="steamid" id="profile-steamid">—</div>
          <div style="color: var(--text-muted); font-size: .85rem; margin-top: .5rem;">
            <span id="profile-logins">—</span> logins · Último acesso: <span id="profile-lastlogin">—</span>
          </div>
        </div>
      </div>

      <!-- ESTATÍSTICAS -->
      <div class="stats-grid" id="stats-grid"></div>

      <!-- COMPRAS -->
      <div class="section">
        <div class="section-head">🛒 Compras (<span id="buys-count">0</span>)</div>
        <div id="buys-grid" class="order-grid"></div>
      </div>

      <!-- VENDAS -->
      <div class="section">
        <div class="section-head">📦 Vendas (<span id="sells-count">0</span>)</div>
        <div id="sells-grid" class="order-grid"></div>
      </div>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/site.js"></script>
  <script>
  document.addEventListener("DOMContentLoaded", async function () {
    var brl = PIRATA.brl;

    function fmtDate(s) {
      if (!s) return "—";
      try { return new Date(s).toLocaleString("pt-BR"); } catch { return s; }
    }

    function esc(s) {
      var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML;
    }

    async function boot() {
      var user = await PIRATA.refreshAuth();
      var gate = document.getElementById("gate");
      if (!user) {
        gate.innerHTML = '<div style="font-size:3rem">🔒</div><p>Faça login para acessar.</p>' +
          '<a class="btn btn-gold" href="/auth/steam" style="margin-top:1rem">Entrar com Steam</a>';
        return;
      }
      if (!user.admin) {
        gate.innerHTML = '<div style="font-size:3rem">⛔</div><p>Acesso restrito. Sua conta não é administradora.</p>';
        return;
      }

      var params = new URLSearchParams(location.search);
      var steamid = params.get("steamid");
      if (!steamid) {
        gate.innerHTML = '<div style="font-size:3rem">❌</div><p>SteamID não informado.</p>';
        return;
      }

      try {
        var resp = await fetch("/api/admin/user/" + steamid, { credentials: "same-origin" }).then(function (r) { return r.json(); });
        if (resp.error) {
          gate.innerHTML = '<div style="font-size:3rem">🤔</div><p>Usuário não encontrado.</p>';
          return;
        }
        gate.style.display = "none";
        document.getElementById("profile-content").style.display = "";
        renderProfile(resp);
      } catch (e) {
        gate.innerHTML = '<div style="font-size:3rem">⚠️</div><p>Erro ao carregar perfil.</p>';
      }
    }

    function renderProfile(data) {
      var u = data.user;
      var stats = data.stats;

      // header
      document.getElementById("profile-avatar").src = u.avatar || "";
      document.getElementById("profile-name").textContent = u.name;
      document.getElementById("profile-steamid").textContent = u.steamid;
      document.getElementById("profile-logins").textContent = u.logins || 1;
      document.getElementById("profile-lastlogin").textContent = fmtDate(u.lastLogin);
      document.getElementById("crumb-name").textContent = u.name;

      // stats
      var statsHTML = [
        { val: stats.totalOrders, lbl: "Total de pedidos" },
        { val: brl(stats.totalSpent), lbl: "Total gasto" },
        { val: brl(stats.totalEarned), lbl: "Total ganho" },
        { val: brl(stats.balance), lbl: "Saldo", color: stats.balance >= 0 ? "var(--success)" : "var(--ruby)" },
      ].map(function (s) {
        return '<div class="stat-card"><div class="val" style="' + (s.color ? "color: " + s.color : "") + '">' + s.val + '</div><div class="lbl">' + s.lbl + '</div></div>';
      }).join("");
      document.getElementById("stats-grid").innerHTML = statsHTML;

      // compras
      document.getElementById("buys-count").textContent = data.buys.length;
      document.getElementById("buys-grid").innerHTML = data.buys.length ? data.buys.map(function (o) { return orderItemHTML(o); }).join("") : '<div class="empty">Nenhuma compra</div>';

      // vendas
      document.getElementById("sells-count").textContent = data.sells.length;
      document.getElementById("sells-grid").innerHTML = data.sells.length ? data.sells.map(function (o) { return orderItemHTML(o); }).join("") : '<div class="empty">Nenhuma venda</div>';
    }

    function orderItemHTML(o) {
      var items = o.items || [];
      if (!items.length) return '';
      var it = items[0]; // mostra primeira skin do pedido
      var statusLabel = o.status === "paid" || o.status === "completed" ? "Concluído" : o.status === "paid_out" ? "Pago" : o.status;
      return '<div class="order-item">' +
        (it.image ? '<img src="' + esc(it.image) + '" />' : '<div style="width:100%;height:120px;background:var(--bg-elev-2);border-radius:.4rem;display:flex;align-items:center;justify-content:center;color:var(--text-muted);font-size:.7rem">Sem imagem</div>') +
        '<div class="iname">' + esc(it.name) + '</div>' +
        '<div class="iprice">' + brl(it.price || 0) + '</div>' +
        '<div class="istatus">' + statusLabel + '</div>' +
      '</div>';
    }

    boot();
  });
  </script>
</body>
</html>
