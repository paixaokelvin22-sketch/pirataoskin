<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — PIRATAOSKIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="site-header"></div>

  <div class="wrap crumb"><a href="index.html">Início</a> / Carrinho</div>
  <div class="wrap"><h2 class="display" style="margin:1rem 0 .2rem">Seu baú</h2></div>

  <div class="wrap cart-layout">
    <div><div id="cart-items"></div></div>

    <aside class="summary" id="summary">
      <h3 class="display">Resumo</h3>
      <div class="srow"><span>Subtotal</span><span id="s-subtotal">R$ 0,00</span></div>
      <div class="srow total"><span>Total</span><b id="s-total">R$ 0,00</b></div>
      <div class="note">⚡ Entrega automática via trade na Steam após a confirmação do pagamento.</div>

      <div id="checkout-area">
        <div class="field" style="margin-top:.2rem">
          <label>Sua Trade URL da Steam (para receber a skin)</label>
          <input id="trade-url" placeholder="https://steamcommunity.com/tradeoffer/new/?partner=...&token=..." />
        </div>
        <button class="btn btn-gold btn-block" id="pay-btn">Pagar com PIX</button>
        <p id="pay-msg" style="font-size:.82rem;color:var(--text-muted);margin:.6rem 0 0"></p>
      </div>

      <!-- painel PIX (preenchido após criar a cobrança) -->
      <div id="pix-panel" style="display:none;margin-top:.6rem">
        <div class="pix-box">
          <div class="qr" id="pix-qr"></div>
          <p style="color:var(--text-muted);font-size:.85rem;margin:.2rem 0 .6rem" id="pix-status">Aguardando pagamento…</p>
          <div class="pix-key">
            <input type="text" id="pix-code" readonly />
            <button class="btn btn-soft btn-sm" id="pix-copy">Copiar</button>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div id="site-footer"></div>

  <script src="js/data.js"></script>
  <script src="js/site.js"></script>
  <script>
  document.addEventListener("DOMContentLoaded", function () {
    var pollTimer = null;

    function thumb(it) {
      var grad = "radial-gradient(circle at 50% 35%, " + ((it.rarityColor || "#5E98D9") + "55") +
        ", transparent 60%), linear-gradient(135deg,#0e1a28,#1b2c40)";
      var inner = it.image
        ? '<img src="' + it.image + '" alt="" loading="lazy" style="width:100%;height:100%;object-fit:contain;padding:3px" />'
        : '<span class="wpn">' + it.name + '</span>';
      return '<div class="ci-thumb" style="background:' + grad + '">' + inner + '</div>';
    }

    function renderCart() {
      var cart = PIRATA.getCart();
      var host = document.getElementById("cart-items");
      var summary = document.getElementById("summary");
      if (!cart.length) {
        host.innerHTML = '<div class="empty"><div class="big">🪙</div>' +
          '<p>Seu baú está vazio, marujo!</p>' +
          '<a class="btn btn-gold" href="index.html" style="margin-top:1rem">Ver skins à venda</a></div>';
        summary.style.display = "none";
        return;
      }
      summary.style.display = "";
      host.innerHTML = cart.map(function (it) {
        return '<div class="cart-item">' + thumb(it) +
          '<div class="ci-info"><div class="nm">' + it.name + '</div>' +
          '<div class="meta">' + (it.meta || "") + '</div></div>' +
          '<div class="ci-price tnum">' + PIRATA.brl(it.price) + '</div>' +
          '<button class="cart-remove" title="Remover" data-id="' + it.id + '">✕</button></div>';
      }).join("");
      host.querySelectorAll(".cart-remove").forEach(function (b) {
        b.addEventListener("click", function () { PIRATA.removeFromCart(b.dataset.id); });
      });
      var subtotal = PIRATA.cartTotal();
      document.getElementById("s-subtotal").textContent = PIRATA.brl(subtotal);
      document.getElementById("s-total").textContent = PIRATA.brl(subtotal);
    }

    async function startCheckout() {
      var user = PIRATA.getUser();
      var msg = document.getElementById("pay-msg");
      if (!user) {
        msg.innerHTML = 'Entre com a Steam para finalizar a compra. <a href="/auth/steam" style="color:var(--gold)">Entrar agora</a>';
        return;
      }
      var cart = PIRATA.getCart();
      if (!cart.length) return;
      var tradeUrl = document.getElementById("trade-url").value.trim();
      if (!/steamcommunity\.com\/tradeoffer\/new/.test(tradeUrl)) {
        msg.style.color = "var(--ruby)";
        msg.innerHTML = 'Informe sua Trade URL da Steam para receber a skin. ' +
          '<a href="https://steamcommunity.com/my/tradeoffers/privacy" target="_blank" style="color:var(--gold)">Onde encontro?</a>';
        return;
      }
      msg.style.color = "var(--text-muted)";
      var btn = document.getElementById("pay-btn");
      btn.disabled = true; btn.textContent = "Gerando PIX…"; msg.textContent = "";

      try {
        var r = await fetch("/api/checkout/pix", {
          method: "POST", credentials: "same-origin",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ items: cart, total: PIRATA.cartTotal(), tradeUrl: tradeUrl }),
        });
        var data = await r.json();
        if (r.status === 503 || data.error === "mp_sem_token") {
          msg.textContent = "Pagamento PIX ainda não ativado: falta o Access Token do Mercado Pago em config.local.json.";
          btn.disabled = false; btn.textContent = "Pagar com PIX"; return;
        }
        if (!data.ok) {
          msg.textContent = "Não foi possível gerar a cobrança PIX. " + (data.detail || data.error || "");
          btn.disabled = false; btn.textContent = "Pagar com PIX"; return;
        }
        showPix(data);
      } catch (e) {
        msg.textContent = "Falha de rede ao gerar a cobrança.";
        btn.disabled = false; btn.textContent = "Pagar com PIX";
      }
    }

    function showPix(data) {
      document.getElementById("checkout-area").style.display = "none";
      var panel = document.getElementById("pix-panel");
      panel.style.display = "";
      var qr = document.getElementById("pix-qr");
      if (data.qr_code_base64) {
        qr.innerHTML = '<img src="data:image/png;base64,' + data.qr_code_base64 + '" alt="QR PIX" style="width:170px;height:170px" />';
      } else {
        qr.innerHTML = '<div style="padding:1rem;color:#0B1622">QR indisponível — use o copia-e-cola.</div>';
      }
      document.getElementById("pix-code").value = data.qr_code || "";
      document.getElementById("pix-copy").onclick = function () {
        var inp = document.getElementById("pix-code"); inp.select();
        navigator.clipboard && navigator.clipboard.writeText(inp.value);
        PIRATA.toast("Código PIX copiado! ⚓");
      };
      pollStatus(data.paymentId);
    }

    function pollStatus(paymentId) {
      var statusEl = document.getElementById("pix-status");
      clearInterval(pollTimer);
      pollTimer = setInterval(async function () {
        try {
          var r = await fetch("/api/checkout/status/" + paymentId, { credentials: "same-origin" });
          var d = await r.json();
          if (d.status === "approved") {
            clearInterval(pollTimer);
            statusEl.innerHTML = "✅ Pagamento aprovado! Suas skins estão a caminho.";
            statusEl.style.color = "var(--success)";
            PIRATA.setCart([]);
            PIRATA.toast("⚓ Pagamento aprovado!");
          } else if (d.status === "cancelled" || d.status === "rejected") {
            clearInterval(pollTimer);
            statusEl.textContent = "Pagamento " + d.status + ".";
          } else {
            statusEl.textContent = "Aguardando pagamento… (" + (d.status || "pending") + ")";
          }
        } catch (e) { /* segue tentando */ }
      }, 4000);
    }

    document.getElementById("pay-btn").addEventListener("click", startCheckout);
    document.addEventListener("cart:change", renderCart);
    renderCart();
  });
  </script>
</body>
</html>
